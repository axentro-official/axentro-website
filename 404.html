<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Axentro | 404 Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#EDEEF5">
  <meta name="robots" content="noindex, nofollow">

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com;">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

  <script>
    (function() {
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('theme') || (systemPrefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
      const savedLang = localStorage.getItem('lang') || 'ar';
      document.documentElement.setAttribute('lang', savedLang);
      document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
    })();
  </script>
</head>
<body>
  <div id="loader" aria-hidden="true"><div class="spinner"></div></div>
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <nav class="navbar" role="navigation" aria-label="Main Navigation">
    <a href="index.html" class="nav-brand">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5zm0 13.5L2 10.5v6.5l10 5 10-5v-6.5l-10 5z"/></svg>
      AXENTRO
    </a>
    <div class="nav-controls">
      <button id="lang-switcher" class="nav-btn ripple-btn" aria-label="Switch Language">
        <i class="fas fa-globe" aria-hidden="true"></i>
        <span class="text-btn" id="lang-text">EN</span>
      </button>
      <button id="theme-toggle" class="nav-btn ripple-btn" aria-label="Toggle Theme">
        <i class="fas fa-moon" id="theme-icon" aria-hidden="true"></i>
        <span class="text-btn" id="theme-text">Dark Mode</span>
      </button>
    </div>
  </nav>

  <section class="hero-section reveal show" style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
    <div class="hero-content">
      <h1 class="hero-title" style="font-size: clamp(5rem, 15vw, 10rem); margin-bottom: 1rem; text-shadow: 0 0 20px rgba(159, 255, 0, 0.3);">404</h1>
      <h2 class="final-cta-text" style="margin-bottom: 1rem;">Page Not Found</h2>
      <p style="max-width: 500px; margin-bottom: 2rem;">عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها. يرجى العودة إلى الصفحة الرئيسية.</p>
      <a href="index.html" class="cta-button ripple-btn"><i class="fas fa-home"></i> العودة للرئيسية</a>
    </div>
  </section>

  <script src="assets/js/language.js" defer></script>
  <script src="assets/js/theme.js" defer></script>
  <script src="assets/js/particles.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
