<html lang="ar" dir="rtl" data-theme="light">
<head>

  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="Axentro Digital Card - Control, Build, Grow. Choose your preferred contact method.">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CY6Y32C90K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-CY6Y32C90K', { send_page_view: false });

  <!-- Prevent Flash of Incorrect Theme/Direction & System Preference Detection -->
  <script>
    (function() {
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('theme') || (systemPrefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);

      const savedLang = localStorage.getItem('lang') || 'ar';
      document.documentElement.setAttribute('lang', savedLang);
      document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg-base: #EDEEF5;
      --text: #1a1a1a;
      --muted: #8e8e8e;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.05);
      --accent: #9fff00;
      --btn-text: #1a1a1a;
      --card-bg: rgba(255, 255, 255, 0.9);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --nav-bg: rgba(241, 241, 241, 0.8);
      --link-hover-bg: rgba(0, 0, 0, 0.03);
      --btn-ripple: rgba(0,0,0,0.1);
    }

    [data-theme="dark"] {
      --bg-base: #050507;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #9fff00;
      --btn-text: #050507;
      --card-bg: rgba(20, 20, 22, 0.6);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      --nav-bg: rgba(10, 10, 12, 0.7);
      --link-hover-bg: rgba(255, 255, 255, 0.05);
      --btn-ripple: rgba(255,255,255,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Preloader */
    #loader {
      position: fixed; inset: 0; background: var(--bg-base); z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--glass-border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Navbar */
    nav.navbar {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      background: linear-gradient(to bottom, var(--nav-bg), transparent);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      padding: 1.5rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.4s ease;
    }
    .nav-brand { 
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.5rem; 
      letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; 
    }
    .nav-brand svg { width: 24px; height: 24px; fill: var(--text); }
    .nav-controls { display: flex; align-items: center; gap: 12px; }
    
    /* Premium Buttons */
    .nav-btn {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text); padding: 10px 20px; border-radius: 50px;
      font-size: 0.85rem; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      position: relative; overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .nav-btn:hover { 
      background: var(--text); color: var(--bg-base); 
      border-color: var(--text); transform: translateY(-2px); 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .nav-btn i { font-size: 1rem; transition: transform 0.3s ease; }
    .nav-btn:hover i { transform: rotate(15deg); }

    /* Ripple Effect */
    .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.6s linear; background: var(--btn-ripple); pointer-events: none; }
    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    /* Hero Section */
    .hero-section {
      position: relative; min-height: 110vh; width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: start;
      overflow: hidden; padding-top: 6rem;
    }
    @media (min-width: 640px) { .hero-section { min-height: 140vh; padding-top: 10rem; } }

    .video-wrapper {
      position: absolute; top: 15vh; left: 0; width: 100%; height: 95vh;
      z-index: 0; pointer-events: none;
    }
    @media (min-width: 640px) { .video-wrapper { top: 20vh; height: 120vh; } }
    
    .video-wrapper video {
      width: 100%; height: 100%; object-fit: cover; opacity: 1;
    }
    
    .gradient-mask {
      position: absolute; top: 0; left: 0; width: 100%; height: 6rem;
      background: linear-gradient(to bottom, var(--bg-base), transparent);
      z-index: 1;
    }
    @media (min-width: 640px) { .gradient-mask { height: 8rem; } }

    .hero-content {
      max-width: 1200px; width: 100%; margin: 0 auto;
      padding: 0 2rem; position: relative; z-index: 10;
      display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem;
    }
    .hero-text-wrapper {
      grid-column: span 12; 
    }
    @media (min-width: 768px) {
      .hero-text-wrapper { grid-column: 10 / span 10; grid-column-start: 2; }
    }

    .hero-title {
      font-family: 'Outfit', sans-serif; font-weight: 800;
      font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1.1;
      letter-spacing: -0.02em; margin-bottom: 2rem;
      opacity: 0; transform: translateY(15px);
      animation: fadeUp 0.8s ease forwards;
    }
    .hero-title .muted { color: var(--muted); font-weight: 500; }
    .hero-title .brand { color: var(--text); display: block; margin-bottom: 0.5rem; }
    
    /* Eye Icon Element */
    .eye-pill {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border: 2px solid var(--text); border-radius: 50%;
      vertical-align: middle; margin: 0 4px; position: relative; top: -2px;
      transition: width 0.3s ease;
    }
    @media (min-width: 768px) { .eye-pill { width: 42px; height: 42px; top: 0; } }
    @media (min-width: 1024px) { .eye-pill { width: 62px; height: 62px; } }
    .eye-dot { width: 8px; height: 8px; background-color: var(--text); border-radius: 50%; }

    /* Links Container */
    .links-container {
      background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: 16px;
      padding: 1.5rem; box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; transform: translateY(15px);
      animation: fadeUp 0.8s ease 0.15s forwards;
      max-width: 650px; margin: 0 auto; width: 100%;
    }

    .link-btn {
      display: flex; align-items: center; gap: 1.25rem; 
      width: 100%;
      padding: 16px 20px; border-radius: 14px; text-decoration: none;
      background: transparent; border: 1px solid transparent;
      color: var(--text); font-weight: 500; font-size: 1rem; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
    }
    .link-btn:hover { background: var(--link-hover-bg); border-color: var(--glass-border); transform: translateY(-1px); }
    
    .link-btn .icon-box { 
      width: 44px; height: 44px; min-width: 44px; border-radius: 12px; 
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem; 
      color: white; transition: all 0.3s; flex-shrink: 0; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .link-btn .text { 
      flex: 1; text-align: start; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
    }
    .link-btn .arrow { color: var(--muted); font-size: 0.9rem; transition: transform 0.3s, color 0.3s; }
    .link-btn:hover .arrow { transform: translateX(-5px); color: var(--text); }
    html[dir="ltr"] .link-btn:hover .arrow { transform: translateX(5px); }

    .bg-wa { background: #25D366; } .bg-call { background: #0ea5e9; }
    .bg-mail { background: #EA4335; } .bg-site { background: var(--accent); color: var(--btn-text) !important; }
    .bg-ig { background: #E1306C; } .bg-fb { background: #1877F2; }
    .bg-vcard { background: rgba(128,128,128,0.2); color: var(--text); }

    /* Edge Anchors */
    .edge-anchor {
      position: absolute; z-index: 20; font-size: 0.75rem; color: var(--muted);
      font-family: 'Inter', sans-serif; font-weight: 500;
      opacity: 0; animation: fadeIn 1s ease 0.5s forwards;
      padding: 1rem;
    }
    .bottom-left { bottom: 0; left: 0; }
    .bottom-right { bottom: 0; right: 0; text-align: right; }
    html[dir="rtl"] .bottom-left { left: auto; right: 0; text-align: left; }
    html[dir="rtl"] .bottom-right { right: auto; left: 0; text-align: left; }

    /* Language Switcher Edge */
    .lang-edge {
      position: fixed; top: 50%; right: 0; transform: translateY(-50%);
      z-index: 50; opacity: 0; animation: fadeIn 1s ease 0.8s forwards;
    }
    html[dir="rtl"] .lang-edge { right: auto; left: 0; }
    .lang-edge button {
      background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
      border-right: none; padding: 14px 20px; cursor: pointer; font-size: 0.85rem; font-weight: 700;
      color: var(--text); border-radius: 50px 0 0 50px; transition: all 0.3s ease;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
      letter-spacing: 1px;
    }
    html[dir="rtl"] .lang-edge button { border-right: 1px solid var(--glass-border); border-left: none; border-radius: 0 50px 50px 0; }
    .lang-edge button:hover { background: var(--text); color: var(--bg-base); transform: scale(1.05); }

    /* Footer Icons */
    .footer-icons {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 50; opacity: 0; animation: fadeIn 1s ease 1s forwards;
      background: var(--glass-bg); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 50px; border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
    }
    .footer-icons a {
      width: 40px; height: 40px; border-radius: 50%; background: transparent;
      color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 1rem;
      text-decoration: none; transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .footer-icons a:hover { background: var(--text); color: var(--bg-base); transform: scale(1.1); }

    /* Floating WhatsApp */
    .floating-wa { 
      position: fixed; bottom: 80px; left: 20px; width: 55px; height: 55px; 
      border-radius: 50%; background: #25D366; color: #fff; display: flex; 
      align-items: center; justify-content: center; font-size: 1.6rem; 
      box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); z-index: 999; 
      text-decoration: none; transition: all 0.3s; 
    }
    html[dir="rtl"] .floating-wa { left: auto; right: 20px; }
    .floating-wa:hover { transform: scale(1.1) rotate(5deg); }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 768px) {
      .nav-btn { padding: 8px 12px; }
      .nav-btn span.text-btn { display: none; } 
      .hero-section { padding-top: 5rem; }
      .footer-icons { bottom: 1rem; }
      .bottom-left, .bottom-right { display: none; } /* Hide edge text on mobile to avoid clutter */
      .links-container { padding: 1rem; }
      .link-btn { padding: 12px 14px; gap: 0.75rem; }
      .link-btn .icon-box { width: 38px; height: 38px; min-width: 38px; font-size: 1.1rem; }
      .link-btn .text { font-size: 0.9rem; }
    }
  </style>
</head>

  <script>
    // 1. Preloader
    window.addEventListener('load', () => {
      document.getElementById('loader').classList.add('hidden');
    });

    // 2. Translation Dictionary
    const translations = {
      ar: {
        desc1: "اختر وسيلة التواصل الأنسب",
        desc2: 'وسنرد عليك سريعًا <span class="eye-pill"><span class="eye-dot"></span></span> Choose your preferred contact method.',
        whatsapp: "تواصل معنا عبر واتساب",
        call: "اتصال مباشر",
        email: "تواصل معنا عبر البريد",
        website: "زيارة الموقع الرئيسي",
        instagram: "تابعنا على انستقرام",
        facebook: "تابعنا على فيسبوك",
        vcard: "احفظ بياناتنا في جهات الاتصال",
        footer_by: "By Axentro Team",
        theme_light: "الوضع النهاري",
        theme_dark: "الوضع الليلي",
        lang_switch: "EN"
      },
      en: {
        desc1: "Choose your preferred contact method",
        desc2: 'and we\'ll get back to you quickly <span class="eye-pill"><span class="eye-dot"></span></span> اختر وسيلة التواصل الأنسب وسنرد عليك سريعًا.',
        whatsapp: "Contact us via WhatsApp",
        call: "Direct Call",
        email: "Contact us via Email",
        website: "Visit Main Website",
        instagram: "Follow us on Instagram",
        facebook: "Follow us on Facebook",
        vcard: "Save our contact details",
        footer_by: "By Axentro Team",
        theme_light: "Light Mode",
        theme_dark: "Dark Mode",
        lang_switch: "AR"
      }
    };

    // 3. Language Switcher Logic
    function applyLanguage(lang) {
      const dict = translations[lang];
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      localStorage.setItem('lang', lang);

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) el.innerHTML = dict[key];
      });

      document.getElementById('lang-text').textContent = dict.lang_switch;
      updateThemeUI(); 
    }

    document.getElementById('lang-switcher').addEventListener('click', (e) => {
      createRipple(e);
      const currentLang = document.documentElement.getAttribute('lang');
      applyLanguage(currentLang === 'ar' ? 'en' : 'ar');
    });

    // Initialize Lang
    applyLanguage(localStorage.getItem('lang') || 'ar');

    // 4. Theme Switcher Logic
    function updateThemeUI() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const iconEl = document.getElementById('theme-icon');
      const textEl = document.getElementById('theme-text');
      const currentLang = document.documentElement.getAttribute('lang');

      if (isLight) {
        iconEl.classList.remove('fa-moon');
        iconEl.classList.add('fa-sun');
        textEl.textContent = translations[currentLang].theme_light;
      } else {
        iconEl.classList.remove('fa-sun');
        iconEl.classList.add('fa-moon');
        textEl.textContent = translations[currentLang].theme_dark;
      }
    }

    document.getElementById('theme-toggle').addEventListener('click', (e) => {
      createRipple(e);
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeUI();
    });

    updateThemeUI();

    // 5. Ripple Effect
    function createRipple(event) {
      const button = event.currentTarget;
      const circle = document.createElement('span');
      const diameter = Math.max(button.clientWidth, button.clientHeight);
      const radius = diameter / 2;

      const rect = button.getBoundingClientRect();
      circle.style.width = circle.style.height = `${diameter}px`;
      circle.style.left = `${event.clientX - rect.left - radius}px`;
      circle.style.top = `${event.clientY - rect.top - radius}px`;
      circle.classList.add('ripple');

      const existingRipple = button.querySelector('.ripple');
      if (existingRipple) existingRipple.remove();

      button.appendChild(circle);
      setTimeout(() => circle.remove(), 600);
    }

    document.querySelectorAll('.ripple-btn').forEach(btn => {
      btn.addEventListener('click', createRipple);
    });
  </script>
</body>
</html>
