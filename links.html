  <!-- Prevent Flash of Incorrect Theme/Direction -->
  <script>
    (function() {
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('theme') || (systemPrefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
      const savedLang = localStorage.getItem('lang') || 'ar';

  <style>
    .hero-content { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem; text-align: center; }

      display: flex; flex-direction: column; gap: 10px;
      max-width: 650px; width: 100%;

    .link-btn {

      background: transparent; border: 1px solid transparent;
      color: var(--text); font-weight: 500; font-size: 1rem; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
    }
    .link-btn:hover { background: var(--link-hover-bg); border-color: var(--glass-border); transform: translateY(-1px); }
    .link-btn .icon-box { 
      width: 44px; height: 44px; min-width: 44px; border-radius: 12px; 
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem; 
      color: white; transition: all 0.3s; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .link-btn .text { flex: 1; text-align: start; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-btn .arrow { color: var(--muted); font-size: 0.9rem; transition: transform 0.3s, color 0.3s; }
    .link-btn:hover .arrow { transform: translateX(-5px); color: var(--text); }
    html[dir="ltr"] .link-btn:hover .arrow { transform: translateX(5px); }

    .bg-wa { background: #25D366; } .bg-call { background: #0ea5e9; }

    .bg-ig { background: #E1306C; } .bg-fb { background: #1877F2; }
    .bg-vcard { background: rgba(128,128,128,0.2); color: var(--text); }

    @media (max-width: 768px) {

      .link-btn .icon-box { width: 38px; height: 38px; min-width: 38px; font-size: 1.1rem; }
      .link-btn .text { font-size: 0.9rem; }
